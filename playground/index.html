<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Arbor CSS Playground</title>
		<link rel="stylesheet" href="/global.css" />
		<link rel="stylesheet" href="/index.arbor.css" />
	</head>
	<body>
		<h1 class="title">Arbor CSS Playground</h1>
		<div class="surface" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary Button</button>
			<button class="button" data-emphasis="secondary">Secondary Button</button>
			<button class="button" data-emphasis="ambient">Ambient Button</button>
		</div>
		<div class="surface" data-emphasis="primary" data-mode-success>
			<button class="button" data-emphasis="primary">Primary Button</button>
			<button class="button" data-emphasis="secondary">Secondary Button</button>
			<button class="button" data-emphasis="ambient">Ambient Button</button>
		</div>

		<script type="module" src="/main.js"></script>
	</body>
</html>
