<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Arbor CSS Playground</title>
		<link rel="stylesheet" href="/global.css" />
		<link rel="stylesheet" href="/index.css" />
	</head>
	<body>
		<h1 class="title">Arbor CSS Playground</h1>
		<div class="surface" data-emphasis="ambient">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<button class="button @mode-neutral" data-emphasis="primary">
				Neutral
			</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface" data-emphasis="secondary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface @mode-success" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<button class="button @mode-neutral" data-emphasis="primary">
				Neutral
			</button>
			<input class="input" placeholder="Input" />
		</div>

		<h2 class="subtitle">Dark Scheme</h2>
		<div class="surface @mode-dark" data-emphasis="ambient">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<button class="button @mode-inverted" data-emphasis="primary">
				Inverted
			</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface @mode-dark" data-emphasis="secondary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface @mode-dark" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface @mode-dark @mode-success" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>

		<h2 class="subtitle">Inverted Mode (auto)</h2>
		<div class="surface @mode-inverted" data-emphasis="primary">
			<button class="button" data-emphasis="primary">Primary</button>
			<button class="button" data-emphasis="secondary">Secondary</button>
			<button class="button" data-emphasis="ambient">Ambient</button>
			<input class="input" placeholder="Input" />
		</div>
		<div class="surface @mode-dark">
			<h3>Dark mode inverted</h3>
			<div class="surface @mode-inverted" data-emphasis="primary">
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<input class="input" placeholder="Input" />
			</div>
		</div>
		<div class="surface @mode-inverted">
			<h3>Double inverted</h3>
			<div class="surface @mode-inverted" data-emphasis="primary">
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<input class="input" placeholder="Input" />
			</div>
		</div>

		<div class="@mode-user" style="--user-hue: 60">
			<h3>@mode-user</h3>
			<div class="surface" data-emphasis="secondary">
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<button class="button @mode-neutral" data-emphasis="primary">
					Neutral
				</button>
				<input class="input" placeholder="Input" />
			</div>
			<div class="surface" data-emphasis="primary">
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<input class="input" placeholder="Input" />
			</div>
			<div class="surface @mode-neutral" data-emphasis="primary">
				<h3>@mode-neutral</h3>
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<input class="input" placeholder="Input" />
			</div>
			<div class="surface @mode-success" data-emphasis="primary">
				<h3>@mode-success</h3>
				<button class="button" data-emphasis="primary">Primary</button>
				<button class="button" data-emphasis="secondary">Secondary</button>
				<button class="button" data-emphasis="ambient">Ambient</button>
				<button class="button @mode-neutral" data-emphasis="primary">
					Neutral
				</button>
				<input class="input" placeholder="Input" />
			</div>
		</div>

		<script type="module" src="/main.js"></script>
	</body>
</html>
